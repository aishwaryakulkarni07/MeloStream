<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melo Stream - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <h1><i class="fa-solid fa-compact-disc"></i> Melo</h1>
            <p>Sign in to continue your premium experience</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <p id="errorMsg" style="color: #ff4d4d; margin-bottom: 15px; display: none; font-size: 0.9rem;"></p>
                <button type="submit" class="btn">Log In</button>
            </form>
            
            <div class="auth-links">
                <span>New to Melo? <a href="signup.html">Sign up for free</a></span>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('melo_token', data.token);
                    localStorage.setItem('melo_user', data.username);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Make sure server is running.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
